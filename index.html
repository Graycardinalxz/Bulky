<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulky - AI Bulk Email Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>* { font-family: 'Inter', sans-serif; }</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
const { useState, useEffect } = React;

const RESEND_API_KEY = 're_MLayTmsD_D7cMY4mwoLqPfSq3CfdKchqk';

const Bulky = () => {
  const [user, setUser] = useState(null);
  const [authScreen, setAuthScreen] = useState('login');
  const [authEmail, setAuthEmail] = useState('');
  const [authPassword, setAuthPassword] = useState('');
  const [verifyCode, setVerifyCode] = useState('');
  const [sentCode, setSentCode] = useState('');
  const [authError, setAuthError] = useState('');
  const [authLoading, setAuthLoading] = useState(false);

  const [darkMode, setDarkMode] = useState(true);
  const [activeTab, setActiveTab] = useState('contacts');
  const [contacts, setContacts] = useState([]);
  const [newContact, setNewContact] = useState({ name: '', email: '', company: '', role: '' });
  const [emailTemplate, setEmailTemplate] = useState({ subject: '', body: '' });
  const [attachments, setAttachments] = useState([]);
  const [generatedEmails, setGeneratedEmails] = useState([]);
  const [sendingProgress, setSendingProgress] = useState(0);
  const [sendingStatus, setSendingStatus] = useState('idle');

  const [senderEmail, setSenderEmail] = useState('');
  const [senderName, setSenderName] = useState('');
  const [senderCompany, setSenderCompany] = useState('');
  const [senderVerified, setSenderVerified] = useState(false);

  const theme = {
    bg: darkMode ? 'bg-[#0a0a0a]' : 'bg-slate-50',
    card: darkMode ? 'bg-white/[0.03] border-white/10' : 'bg-white border-slate-200 shadow-sm',
    text: darkMode ? 'text-white' : 'text-slate-900',
    textMuted: darkMode ? 'text-white/40' : 'text-slate-500',
    textLight: darkMode ? 'text-white/70' : 'text-slate-600',
    input: darkMode ? 'bg-white/5 border-white/10 text-white placeholder-white/25' : 'bg-slate-50 border-slate-200 text-slate-900 placeholder-slate-400',
    inputFocus: darkMode ? 'focus:border-orange-500/50 focus:bg-white/[0.07]' : 'focus:border-orange-500 focus:bg-white',
    buttonSecondary: darkMode ? 'bg-white/5 hover:bg-white/10 text-white' : 'bg-slate-100 hover:bg-slate-200 text-slate-700',
  };

  useEffect(() => {
    const savedUser = localStorage.getItem('bulky_user');
    if (savedUser) setUser(JSON.parse(savedUser));
    const savedSender = localStorage.getItem('bulky_sender');
    if (savedSender) {
      const sender = JSON.parse(savedSender);
      setSenderEmail(sender.email);
      setSenderName(sender.name);
      setSenderCompany(sender.company || '');
      setSenderVerified(sender.verified);
    }
    const savedContacts = localStorage.getItem('bulky_contacts');
    if (savedContacts) setContacts(JSON.parse(savedContacts));
  }, []);

  useEffect(() => {
    if (contacts.length > 0) localStorage.setItem('bulky_contacts', JSON.stringify(contacts));
  }, [contacts]);

  // Send email via Resend API
  const sendEmail = async (to, subject, html, fromName, replyTo) => {
    try {
      const response = await fetch('https://api.resend.com/emails', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${RESEND_API_KEY}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          from: `${fromName} <onboarding@resend.dev>`,
          to: [to],
          subject: subject,
          html: html,
          reply_to: replyTo
        }),
      });
      const data = await response.json();
      return { success: response.ok, data };
    } catch (error) {
      return { success: false, error: error.message };
    }
  };

  // Send verification code
  const sendVerificationCode = async (email, code) => {
    const html = `
      <div style="font-family: Arial, sans-serif; max-width: 500px; margin: 0 auto; padding: 20px;">
        <div style="text-align: center; margin-bottom: 30px;">
          <h1 style="color: #f97316; margin: 0;">Bulky</h1>
          <p style="color: #666;">AI Bulk Email Platform</p>
        </div>
        <div style="background: #f8f8f8; border-radius: 10px; padding: 30px; text-align: center;">
          <h2 style="margin-top: 0;">Your Verification Code</h2>
          <div style="font-size: 36px; font-weight: bold; letter-spacing: 8px; color: #f97316; margin: 20px 0;">
            ${code}
          </div>
          <p style="color: #666; font-size: 14px;">This code expires in 10 minutes</p>
        </div>
        <p style="color: #999; font-size: 12px; text-align: center; margin-top: 20px;">
          If you didn't request this code, please ignore this email.
        </p>
      </div>
    `;
    return await sendEmail(email, 'Your Bulky Verification Code', html, 'Bulky', 'noreply@bulky.app');
  };

  const handleRegister = async () => {
    if (!authEmail || !authPassword) { setAuthError('Please fill all fields'); return; }
    if (authPassword.length < 6) { setAuthError('Password must be at least 6 characters'); return; }
    setAuthLoading(true);
    setAuthError('');
    
    const code = Math.floor(100000 + Math.random() * 900000).toString();
    const result = await sendVerificationCode(authEmail, code);
    
    if (result.success) {
      setSentCode(code);
      setAuthScreen('verify');
    } else {
      setAuthError('Failed to send verification email. Please try again.');
    }
    setAuthLoading(false);
  };

  const handleVerify = () => {
    if (verifyCode === sentCode) {
      const newUser = { email: authEmail, createdAt: new Date().toISOString() };
      setUser(newUser);
      localStorage.setItem('bulky_user', JSON.stringify(newUser));
      setAuthScreen('login');
      setVerifyCode('');
      setSentCode('');
    } else { setAuthError('Invalid code'); }
  };

  const handleLogin = async () => {
    if (!authEmail || !authPassword) { setAuthError('Please fill all fields'); return; }
    setAuthLoading(true);
    setAuthError('');
    
    // For demo, just log in. In production, verify against database
    await new Promise(r => setTimeout(r, 500));
    const newUser = { email: authEmail };
    setUser(newUser);
    localStorage.setItem('bulky_user', JSON.stringify(newUser));
    setAuthLoading(false);
  };

  const handleLogout = () => { 
    setUser(null); 
    localStorage.removeItem('bulky_user'); 
  };

  const verifySenderEmail = async () => {
    if (!senderEmail || !senderName || !senderCompany) {
      setAuthError('Please fill all fields');
      return;
    }
    setAuthLoading(true);
    setAuthError('');
    
    const code = Math.floor(100000 + Math.random() * 900000).toString();
    const result = await sendVerificationCode(senderEmail, code);
    
    if (result.success) {
      setSentCode(code);
    } else {
      setAuthError('Failed to send verification email. Please try again.');
    }
    setAuthLoading(false);
  };

  const confirmSenderEmail = () => {
    if (verifyCode === sentCode) {
      setSenderVerified(true);
      localStorage.setItem('bulky_sender', JSON.stringify({ 
        email: senderEmail, 
        name: senderName, 
        company: senderCompany,
        verified: true 
      }));
      setVerifyCode(''); 
      setSentCode('');
      setAuthError('');
    } else { 
      setAuthError('Invalid code'); 
    }
  };

  const addContact = () => {
    if (!newContact.name || !newContact.email) return;
    setContacts([...contacts, { ...newContact, id: Date.now() }]);
    setNewContact({ name: '', email: '', company: '', role: '' });
  };

  const removeContact = (id) => setContacts(contacts.filter(c => c.id !== id));

  const clearAllContacts = () => {
    setContacts([]);
    localStorage.removeItem('bulky_contacts');
  };

  const handleCSVUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
      const text = event.target.result;
      const lines = text.split('\n').filter(line => line.trim());
      const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
      const data = lines.slice(1).map((line, idx) => {
        const values = line.split(',').map(v => v.trim());
        const obj = { id: Date.now() + idx };
        headers.forEach((header, i) => { obj[header] = values[i] || ''; });
        return obj;
      });
      setContacts([...contacts, ...data]);
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const handleAttachment = (e) => {
    const files = Array.from(e.target.files);
    const newAttachments = files.map(file => ({ 
      name: file.name, 
      size: (file.size / 1024).toFixed(1) + ' KB', 
      type: file.type 
    }));
    setAttachments([...attachments, ...newAttachments]);
  };

  const removeAttachment = (name) => setAttachments(attachments.filter(a => a.name !== name));

  const generateEmails = async () => {
    if (contacts.length === 0) return;
    setSendingStatus('generating');
    const emails = [];
    
    for (let i = 0; i < contacts.length; i++) {
      const contact = contacts[i];
      setSendingProgress(Math.round(((i + 1) / contacts.length) * 100));
      await new Promise(r => setTimeout(r, 100));
      
      let body = emailTemplate.body;
      let subject = emailTemplate.subject;
      
      body = body.replace(/{name}/g, contact.name || '')
                 .replace(/{company}/g, contact.company || '')
                 .replace(/{role}/g, contact.role || '');
      subject = subject.replace(/{name}/g, contact.name || '')
                       .replace(/{company}/g, contact.company || '');
      
      // Convert plain text to HTML
      const htmlBody = body.split('\n').map(line => `<p style="margin: 0 0 10px 0;">${line || '&nbsp;'}</p>`).join('');
      
      emails.push({ 
        to: contact.email, 
        toName: contact.name, 
        subject, 
        body,
        htmlBody: `
          <div style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto;">
            ${htmlBody}
          </div>
        `,
        status: 'ready' 
      });
    }
    
    setGeneratedEmails(emails);
    setSendingStatus('ready');
    setSendingProgress(0);
  };

  const sendAllEmails = async () => {
    if (!senderVerified) { 
      alert('Please verify your sender email first!'); 
      setActiveTab('settings'); 
      return; 
    }
    
    setSendingStatus('sending');
    let successCount = 0;
    let failCount = 0;
    
    for (let i = 0; i < generatedEmails.length; i++) {
      const email = generatedEmails[i];
      
      const result = await sendEmail(
        email.to,
        email.subject,
        email.htmlBody,
        `${senderName} (${senderCompany})`,
        senderEmail
      );
      
      if (result.success) {
        successCount++;
        setGeneratedEmails(prev => prev.map((e, idx) => 
          idx === i ? { ...e, status: 'sent' } : e
        ));
      } else {
        failCount++;
        setGeneratedEmails(prev => prev.map((e, idx) => 
          idx === i ? { ...e, status: 'failed' } : e
        ));
      }
      
      setSendingProgress(Math.round(((i + 1) / generatedEmails.length) * 100));
      
      // Rate limiting - wait between emails
      if (i < generatedEmails.length - 1) {
        await new Promise(r => setTimeout(r, 1000));
      }
    }
    
    setSendingStatus('done');
  };

  // ============ AUTH SCREENS ============
  if (!user) {
    return (
      <div className={`min-h-screen ${theme.bg} flex items-center justify-center p-6`}>
        {darkMode && (
          <div className="fixed inset-0 overflow-hidden pointer-events-none">
            <div className="absolute top-1/4 left-1/4 w-[500px] h-[500px] bg-orange-500/10 rounded-full blur-3xl"></div>
            <div className="absolute bottom-1/4 right-1/4 w-[400px] h-[400px] bg-amber-500/10 rounded-full blur-3xl"></div>
          </div>
        )}
        <div className={`relative w-full max-w-md border rounded-3xl p-8 ${theme.card}`}>
          <div className="text-center mb-8">
            <div className="w-16 h-16 mx-auto rounded-2xl bg-gradient-to-br from-orange-500 to-amber-500 flex items-center justify-center shadow-lg shadow-orange-500/30 mb-4">
              <span className="text-2xl font-black text-white">B</span>
            </div>
            <h1 className={`text-2xl font-extrabold ${theme.text}`}>Bulky</h1>
            <p className={theme.textMuted}>AI Bulk Email Platform</p>
          </div>

          {authScreen === 'login' && (
            <div className="space-y-4">
              <div>
                <label className={`block text-sm font-medium ${theme.textMuted} mb-1.5`}>Email</label>
                <input type="email" value={authEmail} onChange={(e) => setAuthEmail(e.target.value)} placeholder="you@example.com" className={`w-full px-4 py-3 border rounded-xl focus:outline-none transition-all ${theme.input} ${theme.inputFocus}`} />
              </div>
              <div>
                <label className={`block text-sm font-medium ${theme.textMuted} mb-1.5`}>Password</label>
                <input type="password" value={authPassword} onChange={(e) => setAuthPassword(e.target.value)} placeholder="••••••••" className={`w-full px-4 py-3 border rounded-xl focus:outline-none transition-all ${theme.input} ${theme.inputFocus}`} />
              </div>
              {authError && <p className="text-red-500 text-sm">{authError}</p>}
              <button onClick={handleLogin} disabled={authLoading} className="w-full py-3.5 bg-gradient-to-r from-orange-500 to-amber-500 text-white font-bold rounded-xl hover:from-orange-400 hover:to-amber-400 transition-all shadow-lg shadow-orange-500/25 disabled:opacity-50">
                {authLoading ? 'Loading...' : 'Sign In'}
              </button>
              <p className={`text-center text-sm ${theme.textMuted}`}>
                Don't have an account? <button onClick={() => { setAuthScreen('register'); setAuthError(''); }} className="text-orange-500 font-medium hover:underline">Sign Up</button>
              </p>
            </div>
          )}

          {authScreen === 'register' && (
            <div className="space-y-4">
              <div>
                <label className={`block text-sm font-medium ${theme.textMuted} mb-1.5`}>Email</label>
                <input type="email" value={authEmail} onChange={(e) => setAuthEmail(e.target.value)} placeholder="you@example.com" className={`w-full px-4 py-3 border rounded-xl focus:outline-none transition-all ${theme.input} ${theme.inputFocus}`} />
              </div>
              <div>
                <label className={`block text-sm font-medium ${theme.textMuted} mb-1.5`}>Password</label>
                <input type="password" value={authPassword} onChange={(e) => setAuthPassword(e.target.value)} placeholder="Min 6 characters" className={`w-full px-4 py-3 border rounded-xl focus:outline-none transition-all ${theme.input} ${theme.inputFocus}`} />
              </div>
              {authError && <p className="text-red-500 text-sm">{authError}</p>}
              <button onClick={handleRegister} disabled={authLoading} className="w-full py-3.5 bg-gradient-to-r from-orange-500 to-amber-500 text-white font-bold rounded-xl hover:from-orange-400 hover:to-amber-400 transition-all shadow-lg shadow-orange-500/25 disabled:opacity-50">
                {authLoading ? 'Sending code...' : 'Sign Up'}
              </button>
              <p className={`text-center text-sm ${theme.textMuted}`}>
                Already have an account? <button onClick={() => { setAuthScreen('login'); setAuthError(''); }} className="text-orange-500 font-medium hover:underline">Sign In</button>
              </p>
            </div>
          )}

          {authScreen === 'verify' && (
            <div className="space-y-4">
              <div className="text-center mb-4">
                <div className="w-12 h-12 mx-auto rounded-full bg-green-500/20 flex items-center justify-center mb-3"><span className="text-2xl">✉️</span></div>
                <p className={theme.textLight}>Verification code sent to:</p>
                <p className="font-semibold">{authEmail}</p>
              </div>
              <div>
                <label className={`block text-sm font-medium ${theme.textMuted} mb-1.5`}>Verification Code</label>
                <input type="text" value={verifyCode} onChange={(e) => setVerifyCode(e.target.value)} placeholder="6-digit code" maxLength={6} className={`w-full px-4 py-3 border rounded-xl focus:outline-none transition-all text-center text-2xl tracking-widest ${theme.input} ${theme.inputFocus}`} />
              </div>
              {authError && <p className="text-red-500 text-sm text-center">{authError}</p>}
              <button onClick={handleVerify} className="w-full py-3.5 bg-gradient-to-r from-orange-500 to-amber-500 text-white font-bold rounded-xl hover:from-orange-400 hover:to-amber-400 transition-all shadow-lg shadow-orange-500/25">Verify</button>
              <button onClick={() => { setAuthScreen('register'); setAuthError(''); }} className={`w-full py-2 text-sm ${theme.textMuted}`}>← Back</button>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ============ MAIN APP ============
  return (
    <div className={`min-h-screen ${theme.bg} ${theme.text} transition-colors duration-300`}>
      {darkMode && (
        <div className="fixed inset-0 overflow-hidden pointer-events-none">
          <div className="absolute top-0 left-1/4 w-[600px] h-[600px] bg-orange-500/10 rounded-full blur-3xl"></div>
          <div className="absolute bottom-0 right-1/4 w-[500px] h-[500px] bg-amber-500/10 rounded-full blur-3xl"></div>
        </div>
      )}

      <header className={`relative z-10 border-b ${darkMode ? 'border-white/5' : 'border-slate-200'}`}>
        <div className="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-11 h-11 rounded-2xl bg-gradient-to-br from-orange-500 to-amber-500 flex items-center justify-center shadow-lg shadow-orange-500/30">
              <span className="text-xl font-black text-white">B</span>
            </div>
            <div>
              <h1 className="text-xl font-extrabold tracking-tight">Bulky</h1>
              <p className={`text-[10px] ${theme.textMuted}`}>{user.email}</p>
            </div>
          </div>
          <div className="flex items-center gap-3">
            <button onClick={() => setDarkMode(!darkMode)} className={`p-2.5 rounded-xl transition-all ${theme.buttonSecondary}`}>{darkMode ? '☀️' : '🌙'}</button>
            <button onClick={handleLogout} className={`px-4 py-2 text-sm font-medium rounded-xl transition-all ${theme.buttonSecondary}`}>Logout</button>
          </div>
        </div>
      </header>

      <div className="relative z-10 max-w-6xl mx-auto px-6 pt-6">
        <div className={`inline-flex p-1 rounded-xl ${darkMode ? 'bg-white/5' : 'bg-slate-100'}`}>
          {[
            { id: 'contacts', label: '👥 Contacts', count: contacts.length },
            { id: 'compose', label: '✏️ Compose' },
            { id: 'send', label: '🚀 Send' },
            { id: 'settings', label: '⚙️ Settings' }
          ].map(tab => (
            <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-5 py-2.5 rounded-lg text-sm font-semibold transition-all flex items-center gap-2 ${activeTab === tab.id ? 'bg-gradient-to-r from-orange-500 to-amber-500 text-white shadow-lg' : theme.textMuted}`}>
              {tab.label}
              {tab.count !== undefined && <span className={`px-1.5 py-0.5 rounded text-xs ${activeTab === tab.id ? 'bg-white/20' : 'bg-orange-500/20 text-orange-500'}`}>{tab.count}</span>}
            </button>
          ))}
        </div>
      </div>

      <main className="relative z-10 max-w-6xl mx-auto px-6 py-8">
        
        {/* CONTACTS TAB */}
        {activeTab === 'contacts' && (
          <div className="space-y-6">
            <div className="grid md:grid-cols-2 gap-6">
              <div className={`border rounded-2xl p-6 ${theme.card}`}>
                <h3 className="font-bold mb-4 flex items-center gap-2"><span className="text-xl">➕</span> Add Contact</h3>
                <div className="space-y-3">
                  <div className="grid grid-cols-2 gap-3">
                    <input type="text" value={newContact.name} onChange={(e) => setNewContact({...newContact, name: e.target.value})} placeholder="Name *" className={`px-4 py-2.5 border rounded-xl focus:outline-none transition-all text-sm ${theme.input} ${theme.inputFocus}`} />
                    <input type="email" value={newContact.email} onChange={(e) => setNewContact({...newContact, email: e.target.value})} placeholder="Email *" className={`px-4 py-2.5 border rounded-xl focus:outline-none transition-all text-sm ${theme.input} ${theme.inputFocus}`} />
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <input type="text" value={newContact.company} onChange={(e) => setNewContact({...newContact, company: e.target.value})} placeholder="Company" className={`px-4 py-2.5 border rounded-xl focus:outline-none transition-all text-sm ${theme.input} ${theme.inputFocus}`} />
                    <input type="text" value={newContact.role} onChange={(e) => setNewContact({...newContact, role: e.target.value})} placeholder="Role" className={`px-4 py-2.5 border rounded-xl focus:outline-none transition-all text-sm ${theme.input} ${theme.inputFocus}`} />
                  </div>
                  <button onClick={addContact} disabled={!newContact.name || !newContact.email} className="w-full py-2.5 bg-gradient-to-r from-orange-500 to-amber-500 text-white font-semibold rounded-xl disabled:opacity-50">Add Contact</button>
                </div>
              </div>

              <div className={`border rounded-2xl p-6 ${theme.card}`}>
                <h3 className="font-bold mb-4 flex items-center gap-2"><span className="text-xl">📊</span> Import CSV</h3>
                <div className={`border-2 border-dashed rounded-xl p-6 text-center ${darkMode ? 'border-white/10' : 'border-slate-200'}`}>
                  <p className={`${theme.textMuted} text-sm mb-3`}>Upload CSV with columns: name, email, company, role</p>
                  <label className="inline-block px-5 py-2.5 bg-gradient-to-r from-orange-500 to-amber-500 text-white font-semibold rounded-xl cursor-pointer">
                    Choose File
                    <input type="file" accept=".csv" onChange={handleCSVUpload} className="hidden" />
                  </label>
                </div>
              </div>
            </div>

            <div className={`border rounded-2xl overflow-hidden ${theme.card}`}>
              <div className={`px-6 py-4 border-b ${darkMode ? 'border-white/5' : 'border-slate-100'} flex items-center justify-between`}>
                <h3 className="font-bold">Contact List ({contacts.length})</h3>
                {contacts.length > 0 && (
                  <button onClick={clearAllContacts} className="text-red-500 hover:text-red-400 text-sm">Clear All</button>
                )}
              </div>
              {contacts.length === 0 ? (
                <div className="p-12 text-center">
                  <span className="text-4xl block mb-3">👥</span>
                  <p className={theme.textMuted}>No contacts added yet</p>
                </div>
              ) : (
                <div className="divide-y divide-white/5 max-h-80 overflow-y-auto">
                  {contacts.map((contact) => (
                    <div key={contact.id} className="px-6 py-4 flex items-center justify-between hover:bg-white/5 transition-colors">
                      <div>
                        <p className="font-medium">{contact.name}</p>
                        <p className={`text-sm ${theme.textMuted}`}>{contact.email} {contact.company && `• ${contact.company}`} {contact.role && `• ${contact.role}`}</p>
                      </div>
                      <button onClick={() => removeContact(contact.id)} className="text-red-500 hover:text-red-400 p-2 hover:bg-red-500/10 rounded-lg transition-colors">🗑️</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {/* COMPOSE TAB */}
        {activeTab === 'compose' && (
          <div className="space-y-6">
            <div className={`border rounded-2xl p-6 ${theme.card}`}>
              <h3 className="font-bold mb-4">📝 Compose Email</h3>
              <div className={`${darkMode ? 'bg-orange-500/10' : 'bg-orange-50'} rounded-xl p-4 mb-4`}>
                <p className={`text-sm ${darkMode ? 'text-orange-300' : 'text-orange-700'}`}>
                  <strong>Personalization:</strong> Use <code className="bg-orange-500/20 px-1.5 py-0.5 rounded">{'{name}'}</code> <code className="bg-orange-500/20 px-1.5 py-0.5 rounded">{'{company}'}</code> <code className="bg-orange-500/20 px-1.5 py-0.5 rounded">{'{role}'}</code> to personalize each email
                </p>
              </div>
              <div className="space-y-4">
                <div>
                  <label className={`block text-sm font-medium ${theme.textMuted} mb-1.5`}>Subject Line</label>
                  <input type="text" value={emailTemplate.subject} onChange={(e) => setEmailTemplate({...emailTemplate, subject: e.target.value})} placeholder="Hi {name}, quick question about {company}" className={`w-full px-4 py-3 border rounded-xl focus:outline-none transition-all ${theme.input} ${theme.inputFocus}`} />
                </div>
                <div>
                  <label className={`block text-sm font-medium ${theme.textMuted} mb-1.5`}>Email Body</label>
                  <textarea value={emailTemplate.body} onChange={(e) => setEmailTemplate({...emailTemplate, body: e.target.value})} placeholder={`Hi {name},\n\nI noticed {company} is doing great work in your industry.\n\nI'd love to connect and share how we might help.\n\nBest regards`} rows={12} className={`w-full px-4 py-3 border rounded-xl focus:outline-none transition-all resize-none ${theme.input} ${theme.inputFocus}`} />
                </div>
              </div>
            </div>

            <div className={`border rounded-2xl p-6 ${theme.card}`}>
              <h3 className="font-bold mb-4">📎 Attachments</h3>
              {attachments.length > 0 && (
                <div className="flex flex-wrap gap-3 mb-4">
                  {attachments.map((file, idx) => (
                    <div key={idx} className={`flex items-center gap-2 px-3 py-2 rounded-lg ${darkMode ? 'bg-white/5' : 'bg-slate-100'}`}>
                      <span>📄</span>
                      <span className="text-sm">{file.name}</span>
                      <span className={`text-xs ${theme.textMuted}`}>({file.size})</span>
                      <button onClick={() => removeAttachment(file.name)} className="text-red-500 hover:text-red-400 ml-1">×</button>
                    </div>
                  ))}
                </div>
              )}
              <label className={`inline-flex items-center gap-2 px-4 py-2.5 rounded-xl cursor-pointer ${theme.buttonSecondary}`}>
                <span>➕</span> Add Attachment
                <input type="file" multiple onChange={handleAttachment} className="hidden" />
              </label>
              <p className={`text-xs ${theme.textMuted} mt-2`}>Note: Attachments are for preview only in this demo</p>
            </div>
          </div>
        )}

        {/* SEND TAB */}
        {activeTab === 'send' && (
          <div className="space-y-6">
            {!senderVerified && (
              <div className="bg-red-500/10 border border-red-500/30 rounded-xl p-4 flex items-center gap-3">
                <span className="text-2xl">⚠️</span>
                <div className="flex-1">
                  <p className="font-medium text-red-500">Sender email not verified</p>
                  <p className={theme.textMuted}>Go to Settings to verify your sender email first</p>
                </div>
                <button onClick={() => setActiveTab('settings')} className="px-4 py-2 bg-red-500 text-white rounded-lg text-sm font-medium">Go to Settings</button>
              </div>
            )}

            <div className={`border rounded-2xl p-6 ${theme.card}`}>
              <h3 className="font-bold mb-4">📊 Campaign Summary</h3>
              <div className="grid grid-cols-4 gap-4">
                <div className={`p-4 rounded-xl text-center ${darkMode ? 'bg-white/5' : 'bg-slate-50'}`}>
                  <p className="text-3xl font-bold text-orange-500">{contacts.length}</p>
                  <p className={theme.textMuted}>Recipients</p>
                </div>
                <div className={`p-4 rounded-xl text-center ${darkMode ? 'bg-white/5' : 'bg-slate-50'}`}>
                  <p className="text-3xl font-bold text-orange-500">{attachments.length}</p>
                  <p className={theme.textMuted}>Attachments</p>
                </div>
                <div className={`p-4 rounded-xl text-center ${darkMode ? 'bg-white/5' : 'bg-slate-50'}`}>
                  <p className={`text-3xl font-bold ${emailTemplate.subject && emailTemplate.body ? 'text-green-500' : 'text-red-500'}`}>
                    {emailTemplate.subject && emailTemplate.body ? '✓' : '✗'}
                  </p>
                  <p className={theme.textMuted}>Template</p>
                </div>
                <div className={`p-4 rounded-xl text-center ${darkMode ? 'bg-white/5' : 'bg-slate-50'}`}>
                  <p className={`text-3xl font-bold ${senderVerified ? 'text-green-500' : 'text-red-500'}`}>{senderVerified ? '✓' : '✗'}</p>
                  <p className={theme.textMuted}>Sender</p>
                </div>
              </div>
            </div>

            {sendingStatus === 'idle' && (
              <button 
                onClick={generateEmails} 
                disabled={contacts.length === 0 || !emailTemplate.subject || !emailTemplate.body} 
                className="w-full py-4 bg-gradient-to-r from-orange-500 to-amber-500 text-white font-bold rounded-xl disabled:opacity-50 disabled:cursor-not-allowed hover:from-orange-400 hover:to-amber-400 transition-all"
              >
                ⚡ Generate {contacts.length} Personalized Emails
              </button>
            )}

            {sendingStatus === 'generating' && (
              <div className="text-center py-8">
                <div className="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-orange-500 to-amber-500 flex items-center justify-center shadow-lg shadow-orange-500/30">
                  <span className="text-2xl animate-pulse">🤖</span>
                </div>
                <p className="font-bold mb-2">Generating personalized emails...</p>
                <div className="w-64 mx-auto h-2 bg-white/10 rounded-full overflow-hidden">
                  <div className="h-full bg-gradient-to-r from-orange-500 to-amber-500 transition-all" style={{width: `${sendingProgress}%`}}></div>
                </div>
                <p className={`${theme.textMuted} mt-2`}>{sendingProgress}%</p>
              </div>
            )}

            {sendingStatus === 'ready' && (
              <div className="space-y-4">
                <div className={`border rounded-xl overflow-hidden ${theme.card}`}>
                  <div className={`px-4 py-3 ${darkMode ? 'bg-white/5' : 'bg-slate-50'} font-medium flex items-center justify-between`}>
                    <span>Preview ({generatedEmails.length} emails)</span>
                    <button onClick={() => setSendingStatus('idle')} className="text-sm text-orange-500 hover:underline">← Edit</button>
                  </div>
                  <div className="max-h-64 overflow-y-auto divide-y divide-white/5">
                    {generatedEmails.map((email, idx) => (
                      <div key={idx} className="px-4 py-3">
                        <div className="flex items-center justify-between">
                          <p className="font-medium">{email.toName}</p>
                          <p className={`text-xs ${theme.textMuted}`}>{email.to}</p>
                        </div>
                        <p className={`text-sm ${theme.textMuted} mt-1`}>Subject: {email.subject}</p>
                      </div>
                    ))}
                  </div>
                </div>
                <button 
                  onClick={sendAllEmails} 
                  disabled={!senderVerified}
                  className="w-full py-4 bg-gradient-to-r from-green-500 to-emerald-500 text-white font-bold rounded-xl hover:from-green-400 hover:to-emerald-400 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                >
                  🚀 Send All {generatedEmails.length} Emails
                </button>
              </div>
            )}

            {sendingStatus === 'sending' && (
              <div className="text-center py-8">
                <div className="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-green-500 to-emerald-500 flex items-center justify-center shadow-lg shadow-green-500/30">
                  <span className="text-2xl">📤</span>
                </div>
                <p className="font-bold mb-2">Sending emails...</p>
                <div className="w-64 mx-auto h-2 bg-white/10 rounded-full overflow-hidden">
                  <div className="h-full bg-gradient-to-r from-green-500 to-emerald-500 transition-all" style={{width: `${sendingProgress}%`}}></div>
                </div>
                <p className={`${theme.textMuted} mt-2`}>{sendingProgress}% • Please wait...</p>
              </div>
            )}

            {sendingStatus === 'done' && (
              <div className="text-center py-12">
                <div className="w-24 h-24 mx-auto mb-4 rounded-full bg-gradient-to-br from-green-500 to-emerald-500 flex items-center justify-center shadow-xl shadow-green-500/30">
                  <span className="text-5xl">✅</span>
                </div>
                <h3 className="text-2xl font-extrabold mb-2">Campaign Sent!</h3>
                <p className={theme.textMuted}>
                  {generatedEmails.filter(e => e.status === 'sent').length} of {generatedEmails.length} emails sent successfully
                </p>
                {generatedEmails.filter(e => e.status === 'failed').length > 0 && (
                  <p className="text-red-500 text-sm mt-1">
                    {generatedEmails.filter(e => e.status === 'failed').length} failed
                  </p>
                )}
                <button 
                  onClick={() => { setSendingStatus('idle'); setGeneratedEmails([]); }} 
                  className={`mt-6 px-6 py-3 rounded-xl font-semibold ${theme.buttonSecondary}`}
                >
                  Start New Campaign
                </button>
              </div>
            )}
          </div>
        )}

        {/* SETTINGS TAB */}
        {activeTab === 'settings' && (
          <div className="space-y-6">
            <div className={`border rounded-2xl p-6 ${theme.card}`}>
              <h3 className="font-bold mb-4 flex items-center gap-2"><span className="text-xl">📧</span> Sender Email Setup</h3>
              <p className={`${theme.textMuted} text-sm mb-4`}>Configure how your emails appear to recipients</p>
              
              {senderVerified ? (
                <div className={`flex items-center gap-4 p-4 rounded-xl ${darkMode ? 'bg-green-500/10' : 'bg-green-50'}`}>
                  <div className="w-12 h-12 rounded-full bg-green-500/20 flex items-center justify-center">
                    <span className="text-2xl">✅</span>
                  </div>
                  <div className="flex-1">
                    <p className="font-semibold">{senderName}</p>
                    <p className={theme.textMuted}>{senderCompany} • {senderEmail}</p>
                  </div>
                  <button 
                    onClick={() => { 
                      setSenderVerified(false); 
                      localStorage.removeItem('bulky_sender'); 
                      setSentCode('');
                      setVerifyCode('');
                    }} 
                    className="text-red-500 hover:text-red-400 text-sm"
                  >
                    Remove
                  </button>
                </div>
              ) : (
                <div className="space-y-4">
                  <div className="grid md:grid-cols-3 gap-4">
                    <div>
                      <label className={`block text-sm font-medium ${theme.textMuted} mb-1.5`}>Your Name *</label>
                      <input type="text" value={senderName} onChange={(e) => setSenderName(e.target.value)} placeholder="John Smith" className={`w-full px-4 py-3 border rounded-xl focus:outline-none transition-all ${theme.input} ${theme.inputFocus}`} />
                    </div>
                    <div>
                      <label className={`block text-sm font-medium ${theme.textMuted} mb-1.5`}>Company Name *</label>
                      <input type="text" value={senderCompany} onChange={(e) => setSenderCompany(e.target.value)} placeholder="Acme Inc" className={`w-full px-4 py-3 border rounded-xl focus:outline-none transition-all ${theme.input} ${theme.inputFocus}`} />
                    </div>
                    <div>
                      <label className={`block text-sm font-medium ${theme.textMuted} mb-1.5`}>Reply-To Email *</label>
                      <input type="email" value={senderEmail} onChange={(e) => setSenderEmail(e.target.value)} placeholder="you@company.com" className={`w-full px-4 py-3 border rounded-xl focus:outline-none transition-all ${theme.input} ${theme.inputFocus}`} />
                    </div>
                  </div>
                  
                  <div className={`p-4 rounded-xl ${darkMode ? 'bg-white/5' : 'bg-slate-50'}`}>
                    <p className={`text-sm ${theme.textMuted}`}>
                      <strong>Preview:</strong> Recipients will see emails from <span className="text-orange-500">"{senderName || 'Your Name'} ({senderCompany || 'Company'})"</span> and replies will go to <span className="text-orange-500">{senderEmail || 'your@email.com'}</span>
                    </p>
                  </div>

                  {authError && <p className="text-red-500 text-sm">{authError}</p>}
                  
                  {sentCode ? (
                    <div className="space-y-3">
                      <div className={`p-4 rounded-xl ${darkMode ? 'bg-green-500/10' : 'bg-green-50'}`}>
                        <p className={`text-sm ${darkMode ? 'text-green-300' : 'text-green-700'}`}>
                          ✉️ Verification code sent to <strong>{senderEmail}</strong>
                        </p>
                      </div>
                      <div className="flex gap-3">
                        <input 
                          type="text" 
                          value={verifyCode} 
                          onChange={(e) => setVerifyCode(e.target.value)} 
                          placeholder="Enter 6-digit code" 
                          maxLength={6} 
                          className={`flex-1 px-4 py-3 border rounded-xl focus:outline-none transition-all text-center text-xl tracking-widest ${theme.input} ${theme.inputFocus}`} 
                        />
                        <button onClick={confirmSenderEmail} className="px-6 py-3 bg-gradient-to-r from-green-500 to-emerald-500 text-white font-bold rounded-xl hover:from-green-400 hover:to-emerald-400 transition-all">
                          Verify
                        </button>
                      </div>
                      <button onClick={() => { setSentCode(''); setAuthError(''); }} className={`text-sm ${theme.textMuted} hover:underline`}>← Change email</button>
                    </div>
                  ) : (
                    <button 
                      onClick={verifySenderEmail} 
                      disabled={!senderEmail || !senderName || !senderCompany || authLoading} 
                      className="px-6 py-3 bg-gradient-to-r from-orange-500 to-amber-500 text-white font-bold rounded-xl disabled:opacity-50 hover:from-orange-400 hover:to-amber-400 transition-all"
                    >
                      {authLoading ? 'Sending verification...' : 'Send Verification Code'}
                    </button>
                  )}
                </div>
              )}
            </div>

            <div className={`border rounded-2xl p-6 ${theme.card}`}>
              <h3 className="font-bold mb-4 flex items-center gap-2"><span className="text-xl">👤</span> Account</h3>
              <div className="flex items-center justify-between">
                <div>
                  <p className="font-medium">{user.email}</p>
                  <p className={theme.textMuted}>Free Plan • 100 emails/day</p>
                </div>
                <button className="px-4 py-2 bg-gradient-to-r from-orange-500 to-amber-500 text-white font-semibold rounded-xl">
                  Upgrade $49/mo
                </button>
              </div>
            </div>
          </div>
        )}
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<Bulky />);
    </script>
</body>
</html>
