<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulky - AI Bulk Email Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>* { font-family: 'Inter', sans-serif; }</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
const { useState, useEffect } = React;

const Bulky = () => {
  const [user, setUser] = useState(null);
  const [authScreen, setAuthScreen] = useState('login');
  const [authEmail, setAuthEmail] = useState('');
  const [authPassword, setAuthPassword] = useState('');
  const [verifyCode, setVerifyCode] = useState('');
  const [sentCode, setSentCode] = useState('');
  const [authError, setAuthError] = useState('');
  const [authLoading, setAuthLoading] = useState(false);

  const [darkMode, setDarkMode] = useState(true);
  const [activeTab, setActiveTab] = useState('contacts');
  const [contacts, setContacts] = useState([]);
  const [newContact, setNewContact] = useState({ name: '', email: '', company: '', role: '' });
  const [emailTemplate, setEmailTemplate] = useState({ subject: '', body: '' });
  const [attachments, setAttachments] = useState([]);
  const [generatedEmails, setGeneratedEmails] = useState([]);
  const [sendingProgress, setSendingProgress] = useState(0);
  const [sendingStatus, setSendingStatus] = useState('idle');

  const [senderEmail, setSenderEmail] = useState('');
  const [senderName, setSenderName] = useState('');
  const [senderVerified, setSenderVerified] = useState(false);

  const theme = {
    bg: darkMode ? 'bg-[#0a0a0a]' : 'bg-slate-50',
    card: darkMode ? 'bg-white/[0.03] border-white/10' : 'bg-white border-slate-200 shadow-sm',
    text: darkMode ? 'text-white' : 'text-slate-900',
    textMuted: darkMode ? 'text-white/40' : 'text-slate-500',
    textLight: darkMode ? 'text-white/70' : 'text-slate-600',
    input: darkMode ? 'bg-white/5 border-white/10 text-white placeholder-white/25' : 'bg-slate-50 border-slate-200 text-slate-900 placeholder-slate-400',
    inputFocus: darkMode ? 'focus:border-orange-500/50 focus:bg-white/[0.07]' : 'focus:border-orange-500 focus:bg-white',
    buttonSecondary: darkMode ? 'bg-white/5 hover:bg-white/10 text-white' : 'bg-slate-100 hover:bg-slate-200 text-slate-700',
  };

  useEffect(() => {
    const savedUser = localStorage.getItem('bulky_user');
    if (savedUser) setUser(JSON.parse(savedUser));
    const savedSender = localStorage.getItem('bulky_sender');
    if (savedSender) {
      const sender = JSON.parse(savedSender);
      setSenderEmail(sender.email);
      setSenderName(sender.name);
      setSenderVerified(sender.verified);
    }
    const savedContacts = localStorage.getItem('bulky_contacts');
    if (savedContacts) setContacts(JSON.parse(savedContacts));
  }, []);

  useEffect(() => {
    if (contacts.length > 0) localStorage.setItem('bulky_contacts', JSON.stringify(contacts));
  }, [contacts]);

  const handleRegister = async () => {
    if (!authEmail || !authPassword) { setAuthError('Please fill all fields'); return; }
    setAuthLoading(true);
    const code = Math.floor(100000 + Math.random() * 900000).toString();
    setSentCode(code);
    await new Promise(r => setTimeout(r, 1500));
    setAuthLoading(false);
    setAuthScreen('verify');
    alert(`Verification code (demo): ${code}`);
  };

  const handleVerify = () => {
    if (verifyCode === sentCode) {
      const newUser = { email: authEmail, createdAt: new Date().toISOString() };
      setUser(newUser);
      localStorage.setItem('bulky_user', JSON.stringify(newUser));
      setAuthScreen('login');
    } else { setAuthError('Invalid code'); }
  };

  const handleLogin = async () => {
    if (!authEmail || !authPassword) { setAuthError('Please fill all fields'); return; }
    setAuthLoading(true);
    await new Promise(r => setTimeout(r, 1000));
    const newUser = { email: authEmail };
    setUser(newUser);
    localStorage.setItem('bulky_user', JSON.stringify(newUser));
    setAuthLoading(false);
  };

  const handleLogout = () => { setUser(null); localStorage.removeItem('bulky_user'); };

  const verifySenderEmail = async () => {
    if (!senderEmail || !senderName) return;
    setAuthLoading(true);
    const code = Math.floor(100000 + Math.random() * 900000).toString();
    setSentCode(code);
    await new Promise(r => setTimeout(r, 1500));
    setAuthLoading(false);
    alert(`Sender verification code (demo): ${code}`);
  };

  const confirmSenderEmail = () => {
    if (verifyCode === sentCode) {
      setSenderVerified(true);
      localStorage.setItem('bulky_sender', JSON.stringify({ email: senderEmail, name: senderName, verified: true }));
      setVerifyCode(''); setSentCode('');
    } else { setAuthError('Invalid code'); }
  };

  const addContact = () => {
    if (!newContact.name || !newContact.email) return;
    setContacts([...contacts, { ...newContact, id: Date.now() }]);
    setNewContact({ name: '', email: '', company: '', role: '' });
  };

  const removeContact = (id) => setContacts(contacts.filter(c => c.id !== id));

  const handleCSVUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
      const text = event.target.result;
      const lines = text.split('\n').filter(line => line.trim());
      const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
      const data = lines.slice(1).map((line, idx) => {
        const values = line.split(',').map(v => v.trim());
        const obj = { id: Date.now() + idx };
        headers.forEach((header, i) => { obj[header] = values[i] || ''; });
        return obj;
      });
      setContacts([...contacts, ...data]);
    };
    reader.readAsText(file);
  };

  const handleAttachment = (e) => {
    const files = Array.from(e.target.files);
    const newAttachments = files.map(file => ({ name: file.name, size: (file.size / 1024).toFixed(1) + ' KB', type: file.type }));
    setAttachments([...attachments, ...newAttachments]);
  };

  const removeAttachment = (name) => setAttachments(attachments.filter(a => a.name !== name));

  const generateEmails = async () => {
    if (contacts.length === 0) return;
    setSendingStatus('generating');
    const emails = [];
    for (let i = 0; i < contacts.length; i++) {
      const contact = contacts[i];
      setSendingProgress(Math.round((i / contacts.length) * 100));
      await new Promise(r => setTimeout(r, 300));
      let body = emailTemplate.body;
      let subject = emailTemplate.subject;
      body = body.replace(/{name}/g, contact.name).replace(/{company}/g, contact.company || 'your company').replace(/{role}/g, contact.role || '');
      subject = subject.replace(/{name}/g, contact.name).replace(/{company}/g, contact.company || '');
      emails.push({ to: contact.email, toName: contact.name, subject, body, status: 'ready' });
    }
    setGeneratedEmails(emails);
    setSendingStatus('ready');
    setSendingProgress(0);
  };

  const sendAllEmails = async () => {
    if (!senderVerified) { alert('Please verify your sender email first!'); setActiveTab('settings'); return; }
    setSendingStatus('sending');
    for (let i = 0; i < generatedEmails.length; i++) {
      await new Promise(r => setTimeout(r, 800));
      setSendingProgress(Math.round(((i + 1) / generatedEmails.length) * 100));
      setGeneratedEmails(prev => prev.map((email, idx) => idx === i ? { ...email, status: 'sent' } : email));
    }
    setSendingStatus('done');
  };

  if (!user) {
    return (
      <div className={`min-h-screen ${theme.bg} flex items-center justify-center p-6`}>
        {darkMode && (
          <div className="fixed inset-0 overflow-hidden pointer-events-none">
            <div className="absolute top-1/4 left-1/4 w-[500px] h-[500px] bg-orange-500/10 rounded-full blur-3xl"></div>
            <div className="absolute bottom-1/4 right-1/4 w-[400px] h-[400px] bg-amber-500/10 rounded-full blur-3xl"></div>
          </div>
        )}
        <div className={`relative w-full max-w-md border rounded-3xl p-8 ${theme.card}`}>
          <div className="text-center mb-8">
            <div className="w-16 h-16 mx-auto rounded-2xl bg-gradient-to-br from-orange-500 to-amber-500 flex items-center justify-center shadow-lg shadow-orange-500/30 mb-4">
              <span className="text-2xl font-black text-white">B</span>
            </div>
            <h1 className={`text-2xl font-extrabold ${theme.text}`}>Bulky</h1>
            <p className={theme.textMuted}>AI Bulk Email Platform</p>
          </div>

          {authScreen === 'login' && (
            <div className="space-y-4">
              <div>
                <label className={`block text-sm font-medium ${theme.textMuted} mb-1.5`}>Email</label>
                <input type="email" value={authEmail} onChange={(e) => setAuthEmail(e.target.value)} placeholder="you@example.com" className={`w-full px-4 py-3 border rounded-xl focus:outline-none transition-all ${theme.input} ${theme.inputFocus}`} />
              </div>
              <div>
                <label className={`block text-sm font-medium ${theme.textMuted} mb-1.5`}>Password</label>
                <input type="password" value={authPassword} onChange={(e) => setAuthPassword(e.target.value)} placeholder="••••••••" className={`w-full px-4 py-3 border rounded-xl focus:outline-none transition-all ${theme.input} ${theme.inputFocus}`} />
              </div>
              {authError && <p className="text-red-500 text-sm">{authError}</p>}
              <button onClick={handleLogin} disabled={authLoading} className="w-full py-3.5 bg-gradient-to-r from-orange-500 to-amber-500 text-white font-bold rounded-xl hover:from-orange-400 hover:to-amber-400 transition-all shadow-lg shadow-orange-500/25 disabled:opacity-50">
                {authLoading ? 'Loading...' : 'Sign In'}
              </button>
              <p className={`text-center text-sm ${theme.textMuted}`}>
                Don't have an account? <button onClick={() => setAuthScreen('register')} className="text-orange-500 font-medium hover:underline">Sign Up</button>
              </p>
            </div>
          )}

          {authScreen === 'register' && (
            <div className="space-y-4">
              <div>
                <label className={`block text-sm font-medium ${theme.textMuted} mb-1.5`}>Email</label>
                <input type="email" value={authEmail} onChange={(e) => setAuthEmail(e.target.value)} placeholder="you@example.com" className={`w-full px-4 py-3 border rounded-xl focus:outline-none transition-all ${theme.input} ${theme.inputFocus}`} />
              </div>
              <div>
                <label className={`block text-sm font-medium ${theme.textMuted} mb-1.5`}>Password</label>
                <input type="password" value={authPassword} onChange={(e) => setAuthPassword(e.target.value)} placeholder="Min 6 characters" className={`w-full px-4 py-3 border rounded-xl focus:outline-none transition-all ${theme.input} ${theme.inputFocus}`} />
              </div>
              {authError && <p className="text-red-500 text-sm">{authError}</p>}
              <button onClick={handleRegister} disabled={authLoading} className="w-full py-3.5 bg-gradient-to-r from-orange-500 to-amber-500 text-white font-bold rounded-xl hover:from-orange-400 hover:to-amber-400 transition-all shadow-lg shadow-orange-500/25 disabled:opacity-50">
                {authLoading ? 'Sending code...' : 'Sign Up'}
              </button>
              <p className={`text-center text-sm ${theme.textMuted}`}>
                Already have an account? <button onClick={() => setAuthScreen('login')} className="text-orange-500 font-medium hover:underline">Sign In</button>
              </p>
            </div>
          )}

          {authScreen === 'verify' && (
            <div className="space-y-4">
              <div className="text-center mb-4">
                <div className="w-12 h-12 mx-auto rounded-full bg-orange-500/20 flex items-center justify-center mb-3"><span className="text-2xl">📧</span></div>
                <p className={theme.textLight}>Code sent to: <strong>{authEmail}</strong></p>
              </div>
              <div>
                <label className={`block text-sm font-medium ${theme.textMuted} mb-1.5`}>Verification Code</label>
                <input type="text" value={verifyCode} onChange={(e) => setVerifyCode(e.target.value)} placeholder="6-digit code" maxLength={6} className={`w-full px-4 py-3 border rounded-xl focus:outline-none transition-all text-center text-2xl tracking-widest ${theme.input} ${theme.inputFocus}`} />
              </div>
              {authError && <p className="text-red-500 text-sm text-center">{authError}</p>}
              <button onClick={handleVerify} className="w-full py-3.5 bg-gradient-to-r from-orange-500 to-amber-500 text-white font-bold rounded-xl hover:from-orange-400 hover:to-amber-400 transition-all shadow-lg shadow-orange-500/25">Verify</button>
            </div>
          )}
        </div>
      </div>
    );
  }

  return (
    <div className={`min-h-screen ${theme.bg} ${theme.text} transition-colors duration-300`}>
      {darkMode && (
        <div className="fixed inset-0 overflow-hidden pointer-events-none">
          <div className="absolute top-0 left-1/4 w-[600px] h-[600px] bg-orange-500/10 rounded-full blur-3xl"></div>
          <div className="absolute bottom-0 right-1/4 w-[500px] h-[500px] bg-amber-500/10 rounded-full blur-3xl"></div>
        </div>
      )}

      <header className={`relative z-10 border-b ${darkMode ? 'border-white/5' : 'border-slate-200'}`}>
        <div className="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-11 h-11 rounded-2xl bg-gradient-to-br from-orange-500 to-amber-500 flex items-center justify-center shadow-lg shadow-orange-500/30">
              <span className="text-xl font-black text-white">B</span>
            </div>
            <div>
              <h1 className="text-xl font-extrabold tracking-tight">Bulky</h1>
              <p className={`text-[10px] ${theme.textMuted}`}>{user.email}</p>
            </div>
          </div>
          <div className="flex items-center gap-3">
            <button onClick={() => setDarkMode(!darkMode)} className={`p-2.5 rounded-xl transition-all ${theme.buttonSecondary}`}>{darkMode ? '☀️' : '🌙'}</button>
            <button onClick={handleLogout} className={`px-4 py-2 text-sm font-medium rounded-xl transition-all ${theme.buttonSecondary}`}>Logout</button>
          </div>
        </div>
      </header>

      <div className="relative z-10 max-w-6xl mx-auto px-6 pt-6">
        <div className={`inline-flex p-1 rounded-xl ${darkMode ? 'bg-white/5' : 'bg-slate-100'}`}>
          {[
            { id: 'contacts', label: '👥 Contacts', count: contacts.length },
            { id: 'compose', label: '✏️ Compose' },
            { id: 'send', label: '🚀 Send' },
            { id: 'settings', label: '⚙️ Settings' }
          ].map(tab => (
            <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-5 py-2.5 rounded-lg text-sm font-semibold transition-all flex items-center gap-2 ${activeTab === tab.id ? 'bg-gradient-to-r from-orange-500 to-amber-500 text-white shadow-lg' : theme.textMuted}`}>
              {tab.label}
              {tab.count !== undefined && <span className={`px-1.5 py-0.5 rounded text-xs ${activeTab === tab.id ? 'bg-white/20' : 'bg-orange-500/20 text-orange-500'}`}>{tab.count}</span>}
            </button>
          ))}
        </div>
      </div>

      <main className="relative z-10 max-w-6xl mx-auto px-6 py-8">
        
        {activeTab === 'contacts' && (
          <div className="space-y-6">
            <div className="grid md:grid-cols-2 gap-6">
              <div className={`border rounded-2xl p-6 ${theme.card}`}>
                <h3 className="font-bold mb-4 flex items-center gap-2"><span className="text-xl">➕</span> Add Contact</h3>
                <div className="space-y-3">
                  <div className="grid grid-cols-2 gap-3">
                    <input type="text" value={newContact.name} onChange={(e) => setNewContact({...newContact, name: e.target.value})} placeholder="Name *" className={`px-4 py-2.5 border rounded-xl focus:outline-none transition-all text-sm ${theme.input} ${theme.inputFocus}`} />
                    <input type="email" value={newContact.email} onChange={(e) => setNewContact({...newContact, email: e.target.value})} placeholder="Email *" className={`px-4 py-2.5 border rounded-xl focus:outline-none transition-all text-sm ${theme.input} ${theme.inputFocus}`} />
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <input type="text" value={newContact.company} onChange={(e) => setNewContact({...newContact, company: e.target.value})} placeholder="Company" className={`px-4 py-2.5 border rounded-xl focus:outline-none transition-all text-sm ${theme.input} ${theme.inputFocus}`} />
                    <input type="text" value={newContact.role} onChange={(e) => setNewContact({...newContact, role: e.target.value})} placeholder="Role" className={`px-4 py-2.5 border rounded-xl focus:outline-none transition-all text-sm ${theme.input} ${theme.inputFocus}`} />
                  </div>
                  <button onClick={addContact} disabled={!newContact.name || !newContact.email} className="w-full py-2.5 bg-gradient-to-r from-orange-500 to-amber-500 text-white font-semibold rounded-xl disabled:opacity-50">Add</button>
                </div>
              </div>

              <div className={`border rounded-2xl p-6 ${theme.card}`}>
                <h3 className="font-bold mb-4 flex items-center gap-2"><span className="text-xl">📊</span> Import CSV</h3>
                <div className={`border-2 border-dashed rounded-xl p-8 text-center ${darkMode ? 'border-white/10' : 'border-slate-200'}`}>
                  <p className={`${theme.textMuted} text-sm mb-4`}>Upload a CSV file with contacts</p>
                  <label className="inline-block px-5 py-2.5 bg-gradient-to-r from-orange-500 to-amber-500 text-white font-semibold rounded-xl cursor-pointer">
                    Choose File
                    <input type="file" accept=".csv" onChange={handleCSVUpload} className="hidden" />
                  </label>
                </div>
              </div>
            </div>

            <div className={`border rounded-2xl overflow-hidden ${theme.card}`}>
              <div className={`px-6 py-4 border-b ${darkMode ? 'border-white/5' : 'border-slate-100'}`}>
                <h3 className="font-bold">Contact List ({contacts.length})</h3>
              </div>
              {contacts.length === 0 ? (
                <div className="p-12 text-center">
                  <span className="text-4xl block mb-3">👥</span>
                  <p className={theme.textMuted}>No contacts added yet</p>
                </div>
              ) : (
                <div className="divide-y divide-white/5">
                  {contacts.map((contact) => (
                    <div key={contact.id} className="px-6 py-4 flex items-center justify-between">
                      <div>
                        <p className="font-medium">{contact.name}</p>
                        <p className={`text-sm ${theme.textMuted}`}>{contact.email} {contact.company && `• ${contact.company}`}</p>
                      </div>
                      <button onClick={() => removeContact(contact.id)} className="text-red-500 hover:text-red-400 p-2">🗑️</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {activeTab === 'compose' && (
          <div className="space-y-6">
            <div className={`border rounded-2xl p-6 ${theme.card}`}>
              <h3 className="font-bold mb-4">📝 Compose Email</h3>
              <p className={`${theme.textMuted} text-sm mb-4`}>
                Use placeholders: <code className="bg-orange-500/20 px-1 rounded">{'{name}'}</code> <code className="bg-orange-500/20 px-1 rounded">{'{company}'}</code> <code className="bg-orange-500/20 px-1 rounded">{'{role}'}</code>
              </p>
              <div className="space-y-4">
                <div>
                  <label className={`block text-sm font-medium ${theme.textMuted} mb-1.5`}>Subject</label>
                  <input type="text" value={emailTemplate.subject} onChange={(e) => setEmailTemplate({...emailTemplate, subject: e.target.value})} placeholder="Hi {name}, let's connect" className={`w-full px-4 py-3 border rounded-xl focus:outline-none transition-all ${theme.input} ${theme.inputFocus}`} />
                </div>
                <div>
                  <label className={`block text-sm font-medium ${theme.textMuted} mb-1.5`}>Body</label>
                  <textarea value={emailTemplate.body} onChange={(e) => setEmailTemplate({...emailTemplate, body: e.target.value})} placeholder={`Hi {name},\n\nI noticed {company} is doing great work...\n\nBest regards`} rows={10} className={`w-full px-4 py-3 border rounded-xl focus:outline-none transition-all resize-none ${theme.input} ${theme.inputFocus}`} />
                </div>
              </div>
            </div>

            <div className={`border rounded-2xl p-6 ${theme.card}`}>
              <h3 className="font-bold mb-4">📎 Attachments</h3>
              <div className="flex flex-wrap gap-3 mb-4">
                {attachments.map((file, idx) => (
                  <div key={idx} className={`flex items-center gap-2 px-3 py-2 rounded-lg ${darkMode ? 'bg-white/5' : 'bg-slate-100'}`}>
                    <span>📄</span>
                    <span className="text-sm">{file.name}</span>
                    <span className={`text-xs ${theme.textMuted}`}>({file.size})</span>
                    <button onClick={() => removeAttachment(file.name)} className="text-red-500 hover:text-red-400">×</button>
                  </div>
                ))}
              </div>
              <label className={`inline-flex items-center gap-2 px-4 py-2 rounded-xl cursor-pointer ${theme.buttonSecondary}`}>
                <span>➕</span> Add File
                <input type="file" multiple onChange={handleAttachment} className="hidden" />
              </label>
            </div>
          </div>
        )}

        {activeTab === 'send' && (
          <div className="space-y-6">
            {!senderVerified && (
              <div className="bg-red-500/10 border border-red-500/30 rounded-xl p-4 flex items-center gap-3">
                <span className="text-2xl">⚠️</span>
                <div>
                  <p className="font-medium text-red-500">Sender email not verified</p>
                  <p className={theme.textMuted}>Go to Settings and verify your sender email</p>
                </div>
              </div>
            )}

            <div className={`border rounded-2xl p-6 ${theme.card}`}>
              <h3 className="font-bold mb-4">📊 Campaign Summary</h3>
              <div className="grid grid-cols-3 gap-4">
                <div className={`p-4 rounded-xl ${darkMode ? 'bg-white/5' : 'bg-slate-50'}`}>
                  <p className="text-3xl font-bold text-orange-500">{contacts.length}</p>
                  <p className={theme.textMuted}>Recipients</p>
                </div>
                <div className={`p-4 rounded-xl ${darkMode ? 'bg-white/5' : 'bg-slate-50'}`}>
                  <p className="text-3xl font-bold text-orange-500">{attachments.length}</p>
                  <p className={theme.textMuted}>Files</p>
                </div>
                <div className={`p-4 rounded-xl ${darkMode ? 'bg-white/5' : 'bg-slate-50'}`}>
                  <p className={`text-3xl font-bold ${senderVerified ? 'text-green-500' : 'text-red-500'}`}>{senderVerified ? '✓' : '✗'}</p>
                  <p className={theme.textMuted}>Sender</p>
                </div>
              </div>
            </div>

            {sendingStatus === 'idle' && (
              <button onClick={generateEmails} disabled={contacts.length === 0 || !emailTemplate.subject || !emailTemplate.body} className="w-full py-4 bg-gradient-to-r from-orange-500 to-amber-500 text-white font-bold rounded-xl disabled:opacity-50">
                ⚡ Generate {contacts.length} Emails
              </button>
            )}

            {sendingStatus === 'generating' && (
              <div className="text-center py-8">
                <div className="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-orange-500 to-amber-500 flex items-center justify-center"><span className="text-2xl animate-pulse">🤖</span></div>
                <p className="font-bold mb-2">Generating emails...</p>
                <div className="w-64 mx-auto h-2 bg-white/10 rounded-full overflow-hidden"><div className="h-full bg-gradient-to-r from-orange-500 to-amber-500" style={{width: `${sendingProgress}%`}}></div></div>
              </div>
            )}

            {sendingStatus === 'ready' && (
              <div className="space-y-4">
                <div className={`border rounded-xl overflow-hidden ${theme.card}`}>
                  <div className={`px-4 py-3 ${darkMode ? 'bg-white/5' : 'bg-slate-50'} font-medium`}>Preview ({generatedEmails.length} emails)</div>
                  <div className="max-h-64 overflow-y-auto divide-y divide-white/5">
                    {generatedEmails.slice(0, 5).map((email, idx) => (
                      <div key={idx} className="px-4 py-3">
                        <p className="font-medium">{email.toName} ({email.to})</p>
                        <p className={`text-sm ${theme.textMuted}`}>{email.subject}</p>
                      </div>
                    ))}
                  </div>
                </div>
                <button onClick={sendAllEmails} className="w-full py-4 bg-gradient-to-r from-green-500 to-emerald-500 text-white font-bold rounded-xl">🚀 Send All ({generatedEmails.length} emails)</button>
              </div>
            )}

            {sendingStatus === 'sending' && (
              <div className="text-center py-8">
                <div className="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-green-500 to-emerald-500 flex items-center justify-center"><span className="text-2xl">📤</span></div>
                <p className="font-bold mb-2">Sending...</p>
                <div className="w-64 mx-auto h-2 bg-white/10 rounded-full overflow-hidden"><div className="h-full bg-gradient-to-r from-green-500 to-emerald-500" style={{width: `${sendingProgress}%`}}></div></div>
                <p className={`${theme.textMuted} mt-2`}>{sendingProgress}%</p>
              </div>
            )}

            {sendingStatus === 'done' && (
              <div className="text-center py-12">
                <div className="w-24 h-24 mx-auto mb-4 rounded-full bg-gradient-to-br from-green-500 to-emerald-500 flex items-center justify-center"><span className="text-5xl">✅</span></div>
                <h3 className="text-2xl font-extrabold mb-2">Sent!</h3>
                <p className={theme.textMuted}>{generatedEmails.length} emails sent successfully</p>
                <button onClick={() => { setSendingStatus('idle'); setGeneratedEmails([]); }} className={`mt-6 px-6 py-3 rounded-xl font-semibold ${theme.buttonSecondary}`}>New Campaign</button>
              </div>
            )}
          </div>
        )}

        {activeTab === 'settings' && (
          <div className="space-y-6">
            <div className={`border rounded-2xl p-6 ${theme.card}`}>
              <h3 className="font-bold mb-4 flex items-center gap-2"><span className="text-xl">📧</span> Sender Email</h3>
              {senderVerified ? (
                <div className="flex items-center gap-4">
                  <div className="flex-1">
                    <p className="font-medium">{senderName}</p>
                    <p className={theme.textMuted}>{senderEmail}</p>
                  </div>
                  <span className="px-3 py-1 bg-green-500/20 text-green-500 rounded-full text-sm font-medium">✓ Verified</span>
                  <button onClick={() => { setSenderVerified(false); localStorage.removeItem('bulky_sender'); }} className="text-red-500 hover:text-red-400">Remove</button>
                </div>
              ) : (
                <div className="space-y-4">
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className={`block text-sm font-medium ${theme.textMuted} mb-1.5`}>Name</label>
                      <input type="text" value={senderName} onChange={(e) => setSenderName(e.target.value)} placeholder="John Smith" className={`w-full px-4 py-3 border rounded-xl focus:outline-none transition-all ${theme.input} ${theme.inputFocus}`} />
                    </div>
                    <div>
                      <label className={`block text-sm font-medium ${theme.textMuted} mb-1.5`}>Email</label>
                      <input type="email" value={senderEmail} onChange={(e) => setSenderEmail(e.target.value)} placeholder="you@company.com" className={`w-full px-4 py-3 border rounded-xl focus:outline-none transition-all ${theme.input} ${theme.inputFocus}`} />
                    </div>
                  </div>
                  {sentCode ? (
                    <div className="space-y-3">
                      <p className={theme.textMuted}>Enter the code sent to: {senderEmail}</p>
                      <div className="flex gap-3">
                        <input type="text" value={verifyCode} onChange={(e) => setVerifyCode(e.target.value)} placeholder="6-digit code" maxLength={6} className={`flex-1 px-4 py-3 border rounded-xl focus:outline-none transition-all text-center text-xl tracking-widest ${theme.input} ${theme.inputFocus}`} />
                        <button onClick={confirmSenderEmail} className="px-6 py-3 bg-gradient-to-r from-green-500 to-emerald-500 text-white font-bold rounded-xl">Verify</button>
                      </div>
                    </div>
                  ) : (
                    <button onClick={verifySenderEmail} disabled={!senderEmail || !senderName || authLoading} className="px-6 py-3 bg-gradient-to-r from-orange-500 to-amber-500 text-white font-bold rounded-xl disabled:opacity-50">
                      {authLoading ? 'Sending...' : 'Send Code'}
                    </button>
                  )}
                </div>
              )}
            </div>

            <div className={`border rounded-2xl p-6 ${theme.card}`}>
              <h3 className="font-bold mb-4 flex items-center gap-2"><span className="text-xl">👤</span> Account</h3>
              <div className="flex items-center justify-between">
                <div>
                  <p className="font-medium">{user.email}</p>
                  <p className={theme.textMuted}>Free Plan</p>
                </div>
                <button className="px-4 py-2 bg-gradient-to-r from-orange-500 to-amber-500 text-white font-semibold rounded-xl">Upgrade $49/mo</button>
              </div>
            </div>
          </div>
        )}
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<Bulky />);
    </script>
</body>
</html>
